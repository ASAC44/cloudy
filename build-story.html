<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cloudy — Built with Codex</title>
    <style>
      @font-face {
        font-family: "Cloudy Serif";
        src: url("apps/web/src/app/fonts/serifa.woff2") format("woff2");
        font-display: swap;
      }

      :root {
        --paper: #f8f8f6;
        --ink: #121212;
        --muted: #7b7974;
        --line: #e7e6e1;
        --clay: #d97757;
      }

      * { box-sizing: border-box; }
      html, body { margin: 0; min-height: 100%; }
      body {
        min-height: 100vh;
        background: var(--paper);
        color: var(--ink);
        font-family: Arial, Helvetica, sans-serif;
      }

      main {
        min-height: 100vh;
        padding: 64px 7vw;
        display: flex;
        flex-direction: column;
        justify-content: center;
        border-top: 1px solid var(--line);
        animation: fade-in 0.8s ease both;
      }

      .brand {
        position: absolute;
        top: 40px;
        left: 7vw;
        color: var(--clay);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      h1 {
        max-width: 900px;
        margin: 0 0 42px;
        font-family: "Cloudy Serif", Georgia, serif;
        font-size: clamp(64px, 10vw, 148px);
        font-weight: 400;
        letter-spacing: -0.07em;
        line-height: 0.86;
      }

      ul {
        max-width: 820px;
        margin: 0;
        padding: 28px 0 0 28px;
        border-top: 1px solid var(--line);
        font-family: "Cloudy Serif", Georgia, serif;
        font-size: clamp(24px, 3vw, 42px);
        line-height: 1.25;
      }

      li { padding-left: 10px; margin: 0 0 16px; }
      li::marker { color: var(--clay); }

      @keyframes fade-in {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after { animation: none !important; }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="brand">Cloudy</div>
      <h1>Built with Codex.</h1>
      <ul>
        <li>We used Codex to develop and code Cloudy.</li>
        <li>GPT‑5.6 powers Cloudy’s brain.</li>
      </ul>
    </main>
  </body>
</html>
