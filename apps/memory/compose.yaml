services:
  neo4j:
    image: neo4j:5.26.0-community
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-cloudy-local-password}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - cloudy_neo4j_data:/data

volumes:
  cloudy_neo4j_data:
